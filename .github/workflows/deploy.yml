name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - experimental
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref_name }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine build configuration
        id: config
        run: |
          if [ "${{ github.ref_name }}" = "experimental" ]; then
            echo "IS_EXPERIMENTAL=true" >> $GITHUB_ENV
            echo "BASE_PATH=/construct-shader-graph/experimental/" >> $GITHUB_ENV
            echo "is_experimental=true" >> $GITHUB_OUTPUT
          else
            echo "IS_EXPERIMENTAL=false" >> $GITHUB_ENV
            echo "BASE_PATH=/construct-shader-graph/" >> $GITHUB_ENV
            echo "is_experimental=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE_PATH: ${{ env.BASE_PATH }}
          VITE_IS_EXPERIMENTAL: ${{ env.IS_EXPERIMENTAL }}

      - name: Prepare deployment directory
        run: |
          if [ "${{ steps.config.outputs.is_experimental }}" = "true" ]; then
            # For experimental, create a subdirectory structure
            mkdir -p deploy/experimental
            cp -r dist/* deploy/experimental/
          else
            # For main, deploy to root
            mkdir -p deploy
            cp -r dist/* deploy/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./deploy"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
